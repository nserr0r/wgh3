mode = "server"
token = "psseord"
listen = "0.0.0.0:443"

[wireguard]
private_key = "<private.key>"

[network]
tun_name = "wgh3"
address = "10.0.0.1/24"
mtu = 1380

# Хуки в стиле wg-quick. %i подставляется именем TUN.
# Например, включить форвардинг и настроить NAT при старте,
# отменить при остановке:
#
# post_up = [
#     "sysctl -w net.ipv4.ip_forward=1",
#     "iptables -t nat -A POSTROUTING -s 10.0.0.0/24 -o eth0 -j MASQUERADE",
#     "iptables -A FORWARD -i %i -j ACCEPT",
#     "iptables -A FORWARD -o %i -j ACCEPT",
# ]
# post_down = [
#     "iptables -t nat -D POSTROUTING -s 10.0.0.0/24 -o eth0 -j MASQUERADE",
#     "iptables -D FORWARD -i %i -j ACCEPT",
#     "iptables -D FORWARD -o %i -j ACCEPT",
# ]

[tls]
cert = "/etc/letsencrypt/live/example.com/fullchain.pem"
key = "/etc/letsencrypt/live/example.com/privkey.pem"

[fallback]
upstream = "127.0.0.1:3000"
listen_tcp = "0.0.0.0:443"

[[peer]]
public_key = "client1.pub"
allowed_ips = ["10.0.0.2/32"]

[[peer]]
public_key = "client2.pub"
allowed_ips = ["10.0.0.3/32"]

[[peer]]
public_key = "client3.pub"
allowed_ips = ["10.0.0.4/32"]
